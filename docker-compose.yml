version: '3.9'

services:
  db:
    image: ankane/pgvector:latest
    container_name: rag_vectors
    environment:
      - POSTGRES_USER=rag_user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=rag_db
    ports:
      - '5433:5432'
    volumes:
      - rag_pgdata:/var/lib/postgresql/data
volumes:
  rag_pgdata: